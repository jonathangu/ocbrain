name: Feature request
description: Propose a focused improvement to OCBrain.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem should OCBrain solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful contract or implementation change.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Safety and compatibility boundaries
      description: Explain privacy, scope, migration, MCP, hosted, scheduling, training, or egress impact.
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Acceptance proof
      description: What tests or runtime evidence would prove the change works?
