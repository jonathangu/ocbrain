name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e ./packages/ops
          python -m pip install -e ./packages/training
      - name: Golden Shared Context contract
        run: python -m pytest -q tests/test_golden_context_v1.py
      - name: Test
        run: python -m pytest -q
      - name: Lint
        run: ruff check .
      - name: Compile
        run: python -m compileall -q src tests
      - name: Public-safety scan
        run: ocbrain public-safety-check --root "$GITHUB_WORKSPACE"
